services:
  api:
    build:
      context: .                          # build from repo root
      dockerfile: infra/docker/Dockerfile.api
    image: rakuten-api:latest
    container_name: rakuten-api
    ports:
      - "8000:8000"
    env_file:
      - .env                              # override Settings values here
    environment:
      # Artifact paths inside the container (matching the volume mounts below)
      MODEL_PATH: /app/artifacts/model.keras
      SCALER_PATH: /app/artifacts/scaler.joblib
      PCA_PATH: /app/artifacts/pca.joblib
      LABELS_MAP_PATH: /app/artifacts/labels_map.json
    volumes:
      # Mount pre-trained artifacts read-only so model updates
      # don't require an image rebuild — just restart the container.
      - ./core/artifacts:/app/artifacts:ro
      - ./core/models/artifacts:/app/artifacts/models:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s         # allow time for model loading
    restart: unless-stopped
